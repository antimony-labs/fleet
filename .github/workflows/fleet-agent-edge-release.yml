name: Fleet Agent Edge Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fleet-agent-edge-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: fleet_agent
  CORE_REPOSITORY: antimony-labs/core

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fleet
    steps:
      - name: Check out fleet repository
        uses: actions/checkout@v4
        with:
          path: fleet

      - name: Check out core repository dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          path: core
          token: ${{ secrets.CORE_REPO_READ_TOKEN || github.token }}

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            fleet -> target
            core -> target

      - name: Run workspace tests
        run: cargo test --all-features --workspace --locked

  build-release:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: fleet_agent-x86_64-unknown-linux-musl.tar.gz
          - target: aarch64-unknown-linux-musl
            asset: fleet_agent-aarch64-unknown-linux-musl.tar.gz
    defaults:
      run:
        working-directory: fleet
    steps:
      - name: Check out fleet repository
        uses: actions/checkout@v4
        with:
          path: fleet

      - name: Check out core repository dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          path: core
          token: ${{ secrets.CORE_REPO_READ_TOKEN || github.token }}

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            fleet -> target
            core -> target

      - name: Build release binary
        run: cross build --release --locked -p fleet_agent --target ${{ matrix.target }}

      - name: Package target release
        run: |
          set -euo pipefail

          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -C dist -czf "dist/${{ matrix.asset }}" "${BINARY_NAME}"
          sha256sum "dist/${{ matrix.asset }}" > "dist/${{ matrix.asset }}.sha256"
          rm -f "dist/${BINARY_NAME}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-agent-${{ matrix.target }}
          path: |
            fleet/dist/${{ matrix.asset }}
            fleet/dist/${{ matrix.asset }}.sha256

  publish-release:
    name: Publish GitHub release
    needs: build-release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: fleet-agent-*
          merge-multiple: true

      - name: Generate release tag
        id: tag
        run: |
          set -euo pipefail
          echo "tag=fleet-agent-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Fleet Agent ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
